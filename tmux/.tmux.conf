# ~/.tmux.conf — TUYU

# ── Terminal plumbing ──────────────────────────────────────────────
# Without these, colors inside tmux (fastfetch art, btop, your prompt)
# get crushed to 256 colors and the palette drifts.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:RGB,*256col*:RGB"

# ── Quality of life ────────────────────────────────────────────────
set -g mouse on                 # click panes, drag borders, scroll
set -g base-index 1             # windows start at 1, matching workspaces
setw -g pane-base-index 1
set -sg escape-time 10          # no ESC lag in editors
set -g renumber-windows on
set -g history-limit 10000

# ── Pane borders in palette ────────────────────────────────────────
# Inactive: Rainy Navy (recedes) · Active: Mist Teal (matches the bar)
set -g pane-border-style        "fg=#163b61"
set -g pane-active-border-style "fg=#a8d4d2"

# ── Status bar: off ────────────────────────────────────────────────
# Sketchybar already shows time/workspaces; a second bar is noise.
set -g status off

# If you ever want a minimal TUYU status line instead, delete the line
# above and uncomment this block:
# set -g status on
# set -g status-position bottom
# set -g status-style "bg=#08284a,fg=#d8e8e2"
# set -g status-left "#[fg=#f8d66c,bold] #S #[default]"
# set -g status-right "#[fg=#a8d4d2]%a %b %-d #[fg=#7ca8c7]%-I:%M %p "
# setw -g window-status-current-style "fg=#f6b4c9,bold"
# setw -g window-status-style "fg=#7ca8c7"

# ── Pane navigation: vim-style, matching your AeroSpace binds ──────
# alt-h/j/k/l moves between AeroSpace windows; prefix+h/j/k/l moves
# between tmux panes. Same muscle memory, one modifier apart.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
